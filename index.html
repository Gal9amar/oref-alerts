<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אזעקות 24 שעות | פיקוד העורף</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e63946;
    --red-dark: #9b1c27;
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --text: #f0f0f5;
    --text-muted: #7777aa;
    --accent: #ff6b6b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Assistant', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; direction: rtl; }

  header {
    background: linear-gradient(135deg, #1a0005, #0a0a0f);
    border-bottom: 1px solid var(--red-dark);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .siren-icon {
    width: 40px; height: 40px; background: var(--red); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    animation: pulse 2s infinite; flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.7); }
    50% { box-shadow: 0 0 0 12px rgba(230,57,70,0); }
  }
  header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .stats-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px; background: var(--border); border-bottom: 1px solid var(--border);
  }
  .stat { background: var(--surface); padding: 20px 24px; text-align: center; }
  .stat-num { font-size: 36px; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
  .section-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  .city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 40px; }
  .city-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; display: flex; justify-content: space-between; align-items: center;
    transition: all 0.2s; cursor: default; animation: fadeIn 0.4s ease both;
  }
  .city-card:hover { border-color: var(--red); background: var(--surface2); transform: translateY(-1px); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .city-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .city-count {
    background: var(--red); color: white; font-weight: 800; font-size: 13px;
    min-width: 28px; height: 28px; border-radius: 14px; display: flex;
    align-items: center; justify-content: center; padding: 0 8px; margin-right: 10px; flex-shrink: 0;
  }
  .bar { height: 3px; background: linear-gradient(90deg, var(--red), transparent); border-radius: 2px; margin-top: 8px; }

  .timeline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 40px; }
  .timeline-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; display: flex; align-items: center; gap: 16px; font-size: 14px;
    animation: fadeIn 0.3s ease both;
  }
  .timeline-item:hover { background: var(--surface2); }
  .t-time { color: var(--text-muted); font-size: 12px; white-space: nowrap; min-width: 130px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .t-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .t-city { font-weight: 700; flex: 1; }
  .category-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); white-space: nowrap; }

  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 32px; gap: 16px; color: var(--text-muted); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: rgba(230,57,70,0.1); border: 1px solid var(--red-dark); border-radius: 10px; padding: 24px; text-align: center; color: var(--accent); font-size: 14px; line-height: 1.7; }
  .refresh-btn { margin-top: 16px; background: var(--red); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-family: 'Assistant', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
  .last-update { font-size: 12px; color: var(--text-muted); text-align: left; margin-bottom: 24px; }
  .no-alerts { text-align: center; padding: 60px; color: var(--text-muted); font-size: 18px; }
</style>
</head>
<body>

<header>
  <div class="siren-icon">🚨</div>
  <div>
    <h1>מעקב אזעקות — 24 שעות אחרונות</h1>
    <p id="header-sub">טוען נתונים מפיקוד העורף...</p>
  </div>
</header>

<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat"><div class="stat-num" id="s-total">-</div><div class="stat-label">סה"כ אזעקות</div></div>
  <div class="stat"><div class="stat-num" id="s-cities">-</div><div class="stat-label">יישובים</div></div>
  <div class="stat"><div class="stat-num" id="s-top">-</div><div class="stat-label">יישוב מוביל</div></div>
  <div class="stat"><div class="stat-num" id="s-last">-</div><div class="stat-label">אזעקה אחרונה</div></div>
</div>

<div class="main">
  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <div>טוען נתונים מפיקוד העורף...</div>
  </div>
  <div id="error-container" style="display:none"></div>
  <div id="content" style="display:none">
    <div class="last-update" id="last-update"></div>
    <div class="section-title">אזעקות לפי יישוב</div>
    <div class="city-grid" id="city-grid"></div>
    <div class="section-title">ציר זמן אזעקות</div>
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<script>
// Uses Netlify Functions as proxy
// 👇 עדכן את PROXY_BASE עם ה-URL של Railway אחרי הפריסה
const PROXY_BASE = window.RAILWAY_PROXY || 'https://your-proxy.up.railway.app';
const API_URL = PROXY_BASE + '/api/history';

function isWithin24h(alertDate) {
  try {
    const dt = new Date(alertDate.replace(' ', 'T'));
    return (Date.now() - dt.getTime()) < 24 * 60 * 60 * 1000;
  } catch { return true; } // include if can't parse
}

function render(data) {
  if (!Array.isArray(data) || data.length === 0) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('city-grid').innerHTML = '<div class="no-alerts">✅ לא נמצאו אזעקות ב-24 שעות האחרונות</div>';
    return;
  }

  // Filter last 24h — alertDate format: "2024-03-05 14:32:00"
  const alerts = data.filter(a => isWithin24h(a.alertDate));

  if (alerts.length === 0) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('city-grid').innerHTML = '<div class="no-alerts">✅ לא נמצאו אזעקות ב-24 השעות האחרונות</div>';
    return;
  }

  // Count by city
  const cityCount = {};
  alerts.forEach(a => {
    const city = a.data || '-';
    cityCount[city] = (cityCount[city] || 0) + 1;
  });

  const sorted = Object.entries(cityCount).sort((a, b) => b[1] - a[1]);
  const maxCount = sorted[0][1];

  // Stats
  document.getElementById('s-total').textContent = alerts.length;
  document.getElementById('s-cities').textContent = sorted.length;
  document.getElementById('s-top').textContent = sorted[0][0].split(' - ')[0].substring(0, 8);
  const lastTime = alerts[0].alertDate ? alerts[0].alertDate.split(' ')[1].substring(0,5) : '-';
  document.getElementById('s-last').textContent = lastTime;
  document.getElementById('header-sub').textContent = `עודכן: ${new Date().toLocaleTimeString('he-IL')} | ${alerts.length} אזעקות ב-24 שעות האחרונות`;
  document.getElementById('last-update').textContent = `נתונים נמשכו ב-${new Date().toLocaleString('he-IL')}`;

  // City grid
  const grid = document.getElementById('city-grid');
  sorted.forEach(([city, count], i) => {
    const pct = Math.round((count / maxCount) * 100);
    const card = document.createElement('div');
    card.className = 'city-card';
    card.style.animationDelay = `${i * 0.03}s`;
    card.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="city-name" title="${city}">${city}</div>
        <div class="bar" style="width:${pct}%"></div>
      </div>
      <div class="city-count">${count}</div>`;
    grid.appendChild(card);
  });

  // Timeline
  const timeline = document.getElementById('timeline');
  alerts.slice(0, 150).forEach((a, i) => {
    const dt = a.alertDate || '-';
    const city = a.data || '-';
    const title = a.title || 'אזעקה';
    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.style.animationDelay = `${i * 0.02}s`;
    item.innerHTML = `
      <span class="t-time">${dt}</span>
      <span class="t-dot"></span>
      <span class="t-city">${city}</span>
      <span class="category-badge">${title}</span>`;
    timeline.appendChild(item);
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'grid';
  document.getElementById('content').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-container').style.display = 'block';
  document.getElementById('error-container').innerHTML = `
    <div class="error-box">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div>${msg}</div>
      <button class="refresh-btn" onclick="location.reload()">נסה שוב</button>
    </div>`;
}

fetch(API_URL)
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    if (data && data.error === 'geo_blocked') {
      showError('שרתי Netlify חסומים ע"י פיקוד העורף (חסימת IP גיאוגרפי).<br><br>פיקוד העורף מאפשר גישה מ-IP ישראלי בלבד.');
      return;
    }
    render(data);
  })
  .catch(err => {
    showError(`שגיאה בטעינת הנתונים.<br><br><small style="color:#555">${err.message}</small>`);
  });
</script>
</body>
</html>
